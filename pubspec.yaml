name: phone_project
description: Football Team Manager App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.5.0
  firebase_database: ^12.1.4
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.6.0 # For pro icons
  fl_chart: ^0.65.0 # Optional for future stats
  intl: ^0.18.1
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  firebase_auth: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true